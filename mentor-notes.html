<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBridge - Mentor Notes & Resources</title>
    <script src="theme-manager.js"></script>
    <link rel="stylesheet" href="dashboard.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-layout mentor-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon"><i class="fa-solid fa-bridge-water"></i></span>
                EDUBRIDGE
            </div>
            <nav class="sidebar-nav">
                <a href="mentor-dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a>
                <a href="mentor-students.html"><i class="fa-solid fa-users"></i> Students</a>
                <a href="mentor-assignments.html"><i class="fa-solid fa-book-open"></i> Assignments</a>
                <a href="mentor-notes.html" class="active"><i class="fa-solid fa-folder-open"></i> Notes & Resources</a>
                <a href="mentor-doubts.html"><i class="fa-solid fa-circle-question"></i> Student Doubts</a>
                <a href="mentor-analytics.html"><i class="fa-solid fa-chart-line"></i> Productivity & Analytics</a>
                <a href="mentor-ai.html" class="ai-link"><i class="fa-solid fa-robot"></i> AI Insights</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="mentor-settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                <a href="#" id="logoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Navbar -->
            <header class="topbar">
                <div class="page-title">
                    <h2 class="gradient-text"><i class="fa-solid fa-folder-open" style="margin-right: 10px; color: var(--primary-purple);"></i> Notes & Resources</h2>
                </div>
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="notesSearch" placeholder="Search by subject, chapter, or keyword...">
                </div>
                <div class="topbar-right">
                    <div class="filter-dropdown">
                        <select id="subjectFilter" class="glass-select">
                            <option value="all">All Subjects</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                    <button class="glow-btn hero-btn" id="uploadNotesBtn" style="padding: 10px 20px; font-size: 0.9rem;">
                        <span><i class="fa-solid fa-cloud-arrow-up"></i> Upload Notes</span>
                        <div class="btn-glow"></div>
                    </button>

                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Professor&background=random" alt="Avatar" id="userAvatar">
                        <span id="userName">Loading...</span>
                    </div>
                </div>
            </header>

            <div class="dashboard-scrollable">
                
                <!-- Upload Panel (Hidden by default) -->
                <div id="uploadPanel" class="glass-panel" style="display: none; margin-bottom: 30px; padding: 30px; border: 1px solid var(--primary-purple);">
                    <div class="section-header">
                        <h3><i class="fa-solid fa-cloud-arrow-up" style="color: var(--primary-blue);"></i> Upload New Resource</h3>
                        <button class="icon-btn" id="closeUploadBtn"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <form id="uploadForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block;">Subject</label>
                            <select id="uploadSubject" class="glass-select" style="width: 100%;">
                                <option value="Mathematics">Mathematics</option>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="English">English</option>
                            </select>
                        </div>
                        <div>
                            <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block;">Chapter Name</label>
                            <input type="text" id="uploadChapter" class="glass-input" placeholder="e.g., Data Structures" style="width: 100%;" required>
                        </div>
                        <div style="grid-column: 1 / -1;">
                            <label style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px; display: block;">PDF File</label>
                            <div class="upload-zone" id="dragDropZone">
                                <i class="fa-solid fa-file-pdf" style="font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px;"></i>
                                <p>Drag & Drop your PDF here or <span style="color: var(--primary-purple); cursor: pointer; text-decoration: underline;" id="browseFilesText">Browse</span></p>
                                <input type="file" id="pdfFileInput" accept="application/pdf" style="display: none;">
                                <p id="selectedFileName" style="color: var(--text-main); margin-top: 10px; font-weight: 600;"></p>
                            </div>
                        </div>
                        <div style="grid-column: 1 / -1; display: flex; justify-content: flex-end;">
                            <button type="submit" class="glow-btn">
                                <span><i class="fa-solid fa-upload"></i> Upload to Dashboard</span>
                                <div class="btn-glow"></div>
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Empty State Alert (Hidden by default) -->
                <div id="emptyStateNotes" class="empty-state-alert glass-panel" style="display: none;">
                    <div class="alert-icon"><i class="fa-solid fa-folder-open"></i></div>
                    <div class="alert-text">
                        <h3>No notes uploaded yet.</h3>
                        <p>Upload notes to share them with your students.</p>
                    </div>
                </div>

                <!-- Notes Grid -->
                <div class="doubts-grid" id="notesGrid">
                    <!-- Cards will be dynamically inserted here -->
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="mentor-notes.js"></script>
</body>

</html>
